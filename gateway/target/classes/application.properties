server.port=9090
spring.main.web-application-type=reactive

# Sem context-path no gateway (WebFlux não usa server.servlet.context-path)
# server.servlet.context-path=/api  <-- REMOVER

# CORS (opcional aqui; normalmente CORS resolve no serviço de origem)
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Desliga Eureka agora (depois a gente liga de novo, se quiser)
eureka.client.enabled=false

# Se não usa segurança no gateway, não inclua starter-security no pom. 
# E não precisa desses excludes se o starter-security não estiver presente:
# spring.autoconfigure.exclude=...
